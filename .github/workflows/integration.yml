name: Integration Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: make install-cross-platform && make test-integration

  test-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - run: pacman -Sy --noconfirm python python-pip make git
      - run: make install-cross-platform && make test-integration
